<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>888: Merge Rush</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Home Screen -->
        <div class="screen home-screen active">
            <div class="logo">
                <div class="logo-text">888</div>
                <div class="logo-subtitle">MERGE RUSH</div>
            </div>
            
            <div class="menu-buttons">
                <button class="btn-primary" data-mode="classic">
                    <span class="btn-icon">♾️</span>
                    <span>Classic</span>
                </button>
                <button class="btn-primary" data-mode="timeattack">
                    <span class="btn-icon">⏱️</span>
                    <span>Time Attack (88s)</span>
                </button>
                <button class="btn-primary" data-mode="daily8">
                    <span class="btn-icon">📅</span>
                    <span>Daily 8</span>
                </button>
            </div>
            
            <div class="home-footer">
                <button class="btn-secondary" id="quests-btn">
                    <span class="quest-badge" data-count="0">!</span>
                    Quests
                </button>
                <button class="btn-secondary" id="settings-btn">⚙️ Settings</button>
                <button class="btn-secondary" id="leaderboard-btn">🏆 Leaderboard</button>
            </div>
            
            <div class="daily-streak-indicator" id="daily-streak">
                <span class="streak-icon">🔥</span>
                <span class="streak-count">0</span>
            </div>
        </div>

        <!-- Game Screen -->
        <div class="screen game-screen">
            <div class="game-header">
                <div class="score-container">
                    <div class="score-label">SCORE</div>
                    <div class="score-value" id="score">0</div>
                    <div class="combo-multiplier" id="combo-multiplier">×1</div>
                </div>
                
                <div class="combo-timer-container">
                    <div class="combo-label">COMBO</div>
                    <div class="combo-timer-bar">
                        <div class="combo-timer-fill" id="combo-timer"></div>
                    </div>
                    <div class="combo-seconds" id="combo-seconds">8.0s</div>
                </div>
                
                <div class="game-info">
                    <div class="next-tile-preview">
                        <div class="preview-label">NEXT</div>
                        <div class="preview-tile" id="next-tile">1</div>
                    </div>
                    <button class="btn-pause" id="pause-btn">⏸️</button>
                </div>
            </div>
            
            <div class="board-wrapper">
                <div class="game-board" id="game-board">
                    <!-- 8x8 grid will be generated here -->
                </div>
                <canvas class="effects-canvas" id="effects-canvas"></canvas>
            </div>
            
            <div class="boosters-container">
                <button class="booster-btn" data-booster="flip8" data-count="3">
                    <span class="booster-icon">🔄</span>
                    <span class="booster-name">Flip 8</span>
                    <span class="booster-count">3</span>
                </button>
                <button class="booster-btn" data-booster="split" data-count="3">
                    <span class="booster-icon">✂️</span>
                    <span class="booster-name">Split</span>
                    <span class="booster-count">3</span>
                </button>
                <button class="booster-btn" data-booster="shockwave" data-count="3">
                    <span class="booster-icon">💥</span>
                    <span class="booster-name">Shock</span>
                    <span class="booster-count">3</span>
                </button>
            </div>
            
            <div class="mode-indicator" id="mode-indicator">
                <span class="mode-name">Classic</span>
                <span class="mode-timer" id="mode-timer"></span>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="screen game-over-screen">
            <div class="game-over-content">
                <h2 class="game-over-title">GAME OVER</h2>
                
                <div class="final-stats">
                    <div class="stat-row">
                        <span class="stat-label">Final Score</span>
                        <span class="stat-value" id="final-score">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Best Score</span>
                        <span class="stat-value" id="best-score">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Highest Tile</span>
                        <span class="stat-value" id="highest-tile">1</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">888 Blasts</span>
                        <span class="stat-value" id="blast-count">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Total Merges</span>
                        <span class="stat-value" id="merge-count">0</span>
                    </div>
                </div>
                
                <div class="game-over-buttons">
                    <button class="btn-primary" id="retry-btn">
                        <span class="btn-icon">🔄</span>
                        Retry
                    </button>
                    <button class="btn-primary" id="share-btn">
                        <span class="btn-icon">📤</span>
                        Share
                    </button>
                    <button class="btn-secondary" id="home-btn">
                        <span class="btn-icon">🏠</span>
                        Home
                    </button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Settings</h3>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-row">
                        <label>Sound Effects</label>
                        <input type="checkbox" id="sfx-toggle" checked>
                    </div>
                    <div class="setting-row">
                        <label>Music</label>
                        <input type="checkbox" id="music-toggle" checked>
                    </div>
                    <div class="setting-row">
                        <label>Vibration</label>
                        <input type="checkbox" id="vibration-toggle" checked>
                    </div>
                    <div class="setting-row">
                        <label>High Contrast</label>
                        <input type="checkbox" id="contrast-toggle">
                    </div>
                    <div class="setting-row">
                        <label>Reduced Motion</label>
                        <input type="checkbox" id="motion-toggle">
                    </div>
                    <div class="setting-row">
                        <button class="btn-secondary" id="reset-data">Reset Progress</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quests Modal -->
        <div class="modal" id="quests-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Daily Quests</h3>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="quest-list" id="quest-list">
                        <!-- Quests will be dynamically generated -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Leaderboard Modal -->
        <div class="modal" id="leaderboard-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Leaderboard</h3>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="leaderboard-tabs">
                        <button class="tab-btn active" data-tab="classic">Classic</button>
                        <button class="tab-btn" data-tab="timeattack">Time Attack</button>
                        <button class="tab-btn" data-tab="daily8">Daily 8</button>
                    </div>
                    <div class="leaderboard-content" id="leaderboard-content">
                        <!-- Leaderboard entries will be dynamically generated -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Pause Menu -->
        <div class="modal" id="pause-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>PAUSED</h3>
                </div>
                <div class="modal-body">
                    <button class="btn-primary" id="resume-btn">Resume</button>
                    <button class="btn-secondary" id="restart-btn">Restart</button>
                    <button class="btn-secondary" id="quit-btn">Quit to Menu</button>
                </div>
            </div>
        </div>

        <!-- Booster Selection Overlay -->
        <div class="booster-overlay" id="booster-overlay">
            <div class="booster-message">Select target for <span id="booster-name"></span></div>
            <button class="btn-cancel" id="cancel-booster">Cancel</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
