<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>888: Merge Rush</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <div class="logo">
                <h1>888</h1>
                <p>MERGE RUSH</p>
            </div>
            <div class="menu">
                <button class="menu-btn" data-mode="classic">Classic Mode</button>
                <button class="menu-btn" data-mode="timeattack">Time Attack (88s)</button>
                <button class="menu-btn" data-mode="daily">Daily 8</button>
                <button class="menu-btn" id="settings-btn">Settings</button>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Best Score</span>
                    <span class="stat-value" id="best-score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Daily Streak</span>
                    <span class="stat-value" id="daily-streak">0</span>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- HUD -->
            <div class="hud">
                <div class="hud-top">
                    <div class="score-section">
                        <span class="score-label">Score</span>
                        <span class="score-value" id="current-score">0</span>
                    </div>
                    <div class="mode-info">
                        <span id="game-mode">Classic</span>
                        <span id="time-remaining"></span>
                    </div>
                    <button class="pause-btn" id="pause-btn">⏸</button>
                </div>
                
                <div class="combo-section">
                    <div class="combo-bar-container">
                        <div class="combo-bar" id="combo-bar"></div>
                        <span class="combo-text">Combo x<span id="combo-multiplier">1</span></span>
                    </div>
                </div>

                <div class="boosters">
                    <button class="booster" id="flip-booster" data-booster="flip" disabled>
                        <span class="booster-icon">🔄</span>
                        <span class="booster-count" id="flip-count">0</span>
                    </button>
                    <button class="booster" id="split-booster" data-booster="split" disabled>
                        <span class="booster-icon">✂️</span>
                        <span class="booster-count" id="split-count">0</span>
                    </button>
                    <button class="booster" id="shockwave-booster" data-booster="shockwave" disabled>
                        <span class="booster-icon">💥</span>
                        <span class="booster-count" id="shockwave-count">0</span>
                    </button>
                </div>
            </div>

            <!-- Game Board -->
            <div class="game-container">
                <div class="board" id="game-board">
                    <!-- 8x8 grid will be generated by JavaScript -->
                </div>
                
                <div class="next-tile-preview">
                    <span class="preview-label">Next</span>
                    <div class="preview-tile" id="next-tile">1</div>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen">
            <div class="gameover-content">
                <h2>Game Over!</h2>
                <div class="final-stats">
                    <div class="final-stat">
                        <span class="stat-label">Final Score</span>
                        <span class="stat-value" id="final-score">0</span>
                    </div>
                    <div class="final-stat">
                        <span class="stat-label">Best Combo</span>
                        <span class="stat-value" id="best-combo">x1</span>
                    </div>
                    <div class="final-stat">
                        <span class="stat-label">888 Blasts</span>
                        <span class="stat-value" id="blast-count">0</span>
                    </div>
                </div>
                <div class="gameover-buttons">
                    <button class="menu-btn" id="retry-btn">Play Again</button>
                    <button class="menu-btn" id="home-btn">Home</button>
                </div>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settings-screen" class="screen">
            <div class="settings-content">
                <h2>Settings</h2>
                <div class="setting">
                    <label for="sound-toggle">Sound Effects</label>
                    <input type="checkbox" id="sound-toggle" checked>
                </div>
                <div class="setting">
                    <label for="vibration-toggle">Vibration</label>
                    <input type="checkbox" id="vibration-toggle" checked>
                </div>
                <div class="setting">
                    <label for="reduced-motion">Reduced Motion</label>
                    <input type="checkbox" id="reduced-motion">
                </div>
                <div class="setting">
                    <label for="high-contrast">High Contrast</label>
                    <input type="checkbox" id="high-contrast">
                </div>
                <button class="menu-btn" id="settings-back">Back</button>
            </div>
        </div>
    </div>

    <!-- Particles Container -->
    <div id="particles-container"></div>

    <script src="game.js"></script>
</body>
</html>
