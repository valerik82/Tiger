<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollywood Crazy Wheel</title>
    <link rel="stylesheet" href="/src/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Loading Screen -->
        <div id="loading-screen" class="screen active">
            <div class="hollywood-title">
                <h1>Hollywood</h1>
                <div class="crazy-wheel-text">Crazy Wheel</div>
                <div class="loading-bar">
                    <div class="loading-fill"></div>
                </div>
                <div class="loading-text">Loading...</div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen">
            <div class="menu-content">
                <div class="logo-container">
                    <h1 class="game-logo">Hollywood<br><span>Crazy Wheel</span></h1>
                    <div class="sparkle-container">
                        <div class="sparkle"></div>
                        <div class="sparkle"></div>
                        <div class="sparkle"></div>
                    </div>
                </div>
                <div class="menu-buttons">
                    <button class="btn btn-primary" id="play-btn">
                        <span class="btn-icon">🎬</span> Play
                    </button>
                    <button class="btn btn-secondary" id="daily-btn">
                        <span class="btn-icon">⭐</span> Daily Premiere
                    </button>
                    <button class="btn btn-secondary" id="endless-btn">
                        <span class="btn-icon">🎉</span> After-Party
                    </button>
                </div>
                <div class="menu-stats">
                    <div class="stat-item">
                        <span class="stat-icon">🎟️</span>
                        <span id="tickets-display">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">⭐</span>
                        <span id="stars-display">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Top UI -->
            <div class="game-header">
                <div class="level-info">
                    <span class="level-label">Scene</span>
                    <span id="level-number">1</span>
                </div>
                <div class="score-display">
                    <span id="current-score">0</span>
                </div>
                <div class="moves-display">
                    <span class="moves-icon">🎬</span>
                    <span id="moves-left">20</span>
                </div>
            </div>

            <!-- Crazy Wheel -->
            <div id="crazy-wheel-container">
                <div id="crazy-wheel" class="wheel">
                    <div class="wheel-pointer"></div>
                    <canvas id="wheel-canvas" width="300" height="300"></canvas>
                </div>
                <button id="spin-wheel-btn" class="spin-btn">SPIN!</button>
            </div>

            <!-- Objective Display -->
            <div id="objective-display">
                <div class="objective-text"></div>
                <div class="objective-progress">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <!-- Game Board -->
            <div id="game-board-container">
                <canvas id="game-board" width="420" height="540"></canvas>
                <div id="combo-display" class="combo-popup"></div>
            </div>

            <!-- Power-ups -->
            <div class="power-ups-container">
                <button class="power-up-btn" data-power="directors-cut">
                    <span class="power-icon">🎬</span>
                    <span class="power-count">3</span>
                </button>
                <button class="power-up-btn" data-power="clapboard">
                    <span class="power-icon">🎭</span>
                    <span class="power-count">2</span>
                </button>
                <button class="power-up-btn" data-power="spotlight">
                    <span class="power-icon">💡</span>
                    <span class="power-count">2</span>
                </button>
                <button class="power-up-btn" data-power="reshoot">
                    <span class="power-icon">🔄</span>
                    <span class="power-count">1</span>
                </button>
            </div>

            <!-- Pause Button -->
            <button id="pause-btn" class="pause-btn">⏸️</button>
        </div>

        <!-- Mini-Games -->
        <div id="minigame-container" class="screen">
            <!-- Red Carpet Runner -->
            <div id="red-carpet-game" class="minigame">
                <div class="minigame-title">Red Carpet Runner!</div>
                <canvas id="red-carpet-canvas" width="400" height="600"></canvas>
                <div class="minigame-score">Stars: <span id="carpet-stars">0</span></div>
            </div>

            <!-- Casting Call -->
            <div id="casting-call-game" class="minigame">
                <div class="minigame-title">Casting Call!</div>
                <div class="casting-target">Find: <span id="target-face"></span></div>
                <div id="faces-grid" class="faces-container"></div>
                <div class="minigame-timer">Time: <span id="casting-timer">10</span>s</div>
            </div>

            <!-- Sound Check -->
            <div id="sound-check-game" class="minigame">
                <div class="minigame-title">Sound Check!</div>
                <div id="sound-buttons" class="sound-container">
                    <button class="sound-btn" data-tone="1">🎵</button>
                    <button class="sound-btn" data-tone="2">🎶</button>
                    <button class="sound-btn" data-tone="3">🎼</button>
                    <button class="sound-btn" data-tone="4">🎤</button>
                </div>
                <div class="minigame-status">Listen & Repeat!</div>
            </div>
        </div>

        <!-- Level Complete -->
        <div id="level-complete" class="popup">
            <div class="popup-content">
                <h2 class="popup-title">Scene Complete!</h2>
                <div class="stars-earned">
                    <span class="star-icon">⭐</span>
                    <span class="star-icon">⭐</span>
                    <span class="star-icon">⭐</span>
                </div>
                <div class="rewards">
                    <div class="reward-item">
                        <span>Tickets:</span>
                        <span id="tickets-earned">+50</span>
                    </div>
                    <div class="reward-item">
                        <span>Score:</span>
                        <span id="final-score">0</span>
                    </div>
                </div>
                <button class="btn btn-primary" id="next-level-btn">Next Scene</button>
            </div>
        </div>

        <!-- Movie Complete -->
        <div id="movie-complete" class="popup">
            <div class="popup-content movie-poster">
                <h2 class="popup-title">Movie Complete!</h2>
                <div id="poster-display" class="poster">
                    <div class="poster-title"></div>
                    <div class="poster-genre"></div>
                    <div class="poster-stars">
                        ⭐⭐⭐⭐⭐
                    </div>
                </div>
                <div class="movie-rewards">
                    <div class="buff-earned">Buff Unlocked: <span id="buff-text"></span></div>
                </div>
                <button class="btn btn-primary" id="continue-btn">Continue</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
